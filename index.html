<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Tático Online</title>

<style>
body { margin:0; font-family:Arial; background:#0d0f12; color:#00ff9c; }
.container { padding:15px; }
h2 { border-left:4px solid #00ff9c; padding-left:10px; }
input, textarea, button {
    width:100%; margin-top:8px; padding:10px;
    border-radius:6px; border:none;
}
input, textarea { background:#1a1d21; color:#fff; }
button { background:#00ff9c; color:#000; font-weight:bold; }
.lista { background:#1a1d21; padding:10px; border-radius:6px; margin-top:10px; }
.nome-item { display:flex; justify-content:space-between; margin-bottom:5px; }
.btnX { background:red; color:#fff; width:35px; }
.time-box { margin-top:10px; padding:10px; border-radius:6px; }
.azul { background:#001f3f; }
.vermelho { background:#3f0000; }
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="login">
<h2>🔐 Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button onclick="registrar()">Registrar</button>
<button onclick="logar()">Entrar</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<h2>📍 Detalhes</h2>
<input type="date" id="data">
<input type="time" id="hora">
<input type="text" id="local" placeholder="Local">
<button onclick="salvarTudo()">Salvar</button>

<h2>✅ Confirmar</h2>
<input id="nome" placeholder="Seu nome">
<button onclick="confirmar()">Confirmar</button>
<div id="listaConfirmados" class="lista"></div>

<h2>🎲 Times</h2>
<button onclick="sortearTimes()">Sortear Times</button>
<div id="timeAzul" class="time-box azul"></div>
<div id="timeVermelho" class="time-box vermelho"></div>

<h2>🧾 Observações</h2>
<textarea id="obs"></textarea>
<button onclick="salvarTudo()">Salvar</button>

<h2>🎯 Missão</h2>
<textarea id="missao"></textarea>
<button onclick="salvarTudo()">Salvar</button>

<div id="briefing" class="lista"></div>
<button onclick="sair()">Sair</button>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged, signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore, collection, addDoc, deleteDoc,
  doc, setDoc, onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 SEU FIREBASE JÁ CONFIGURADO
const firebaseConfig = {
  apiKey: "AIzaSyBerS-gTjBoG6ukYrIlHQPxHbaCBAWKRDI",
  authDomain: "gtap-6e08f.firebaseapp.com",
  projectId: "gtap-6e08f",
  storageBucket: "gtap-6e08f.firebasestorage.app",
  messagingSenderId: "1021920472413",
  appId: "1:1021920472413:web:519ba498aef52f8c7c0cb4",
  measurementId: "G-6CZ4YJHR6Y"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// LOGIN
window.registrar = () =>
  createUserWithEmailAndPassword(auth, email.value, senha.value);

window.logar = () =>
  signInWithEmailAndPassword(auth, email.value, senha.value);

window.sair = () => signOut(auth);

// CONTROLE LOGIN
onAuthStateChanged(auth, user => {
  if (user) {
    login.style.display = "none";
    app.style.display = "block";
    carregar();
  } else {
    login.style.display = "block";
    app.style.display = "none";
  }
});

// SALVAR DADOS
async function salvarTudo() {
  await setDoc(doc(db, "dados", "geral"), {
    data: data.value,
    hora: hora.value,
    local: local.value,
    obs: obs.value,
    missao: missao.value
  });
}

// CONFIRMAR
window.confirmar = async () => {
  if (!nome.value) return;
  await addDoc(collection(db, "confirmados"), {
    nome: nome.value
  });
  nome.value = "";
};

// REMOVER
async function remover(id) {
  await deleteDoc(doc(db, "confirmados", id));
}

// CARREGAR TEMPO REAL
function carregar() {

  // LISTA
  onSnapshot(collection(db, "confirmados"), snap => {
    listaConfirmados.innerHTML = "";
    let nomes = [];

    snap.forEach(docu => {
      nomes.push(docu.data().nome);

      let div = document.createElement("div");
      div.className = "nome-item";

      div.innerHTML =
        docu.data().nome +
        " <button class='btnX'>X</button>";

      div.querySelector("button").onclick =
        () => remover(docu.id);

      listaConfirmados.appendChild(div);
    });

    window.listaAtual = nomes;
  });

  // DADOS
  onSnapshot(doc(db, "dados", "geral"), d => {
    if (d.exists()) {
      let dados = d.data();

      data.value = dados.data || "";
      hora.value = dados.hora || "";
      local.value = dados.local || "";
      obs.value = dados.obs || "";
      missao.value = dados.missao || "";

      briefing.innerText =
        "MISSÃO:\n" + (dados.missao || "") +
        "\n\nOBSERVAÇÕES:\n" + (dados.obs || "");
    }
  });

  // TIMES
  onSnapshot(doc(db, "dados", "times"), d => {
    if (d.exists()) {
      let t = d.data();

      timeAzul.innerHTML =
        "🔵<br>" + (t.azul || []).join("<br>");

      timeVermelho.innerHTML =
        "🔴<br>" + (t.vermelho || []).join("<br>");
    }
  });
}

// SORTEIO
window.sortearTimes = async () => {
  let lista = window.listaAtual || [];

  if (lista.length < 2) {
    alert("Precisa de pelo menos 2 jogadores");
    return;
  }

  lista.sort(() => Math.random() - 0.5);

  let meio = Math.ceil(lista.length / 2);

  let azul = lista.slice(0, meio);
  let vermelho = lista.slice(meio);

  await setDoc(doc(db, "dados", "times"), {
    azul, vermelho
  });
};

</script>

</body>
</html>
